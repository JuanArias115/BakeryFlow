services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: bakeryflow-reverse-proxy
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - edge
      - internal

  frontend:
    build:
      context: ./src/frontend/bakeryflow-app
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: production
    container_name: bakeryflow-frontend
    expose:
      - "8085"
    restart: unless-stopped
    networks:
      - internal

  backend:
    build:
      context: ./src/backend
      dockerfile: BakeryFlow.Api/Dockerfile
    container_name: bakeryflow-backend
    depends_on:
      - postgres
    expose:
      - "8086"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8086
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      App__PathBase: /bakeryFlow
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      Cors__AllowedOrigins__0: https://deliciasbakery.shop
    restart: unless-stopped
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: bakeryflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - bakeryflow-postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal

volumes:
  bakeryflow-postgres:

networks:
  edge:
  internal:
    internal: true
