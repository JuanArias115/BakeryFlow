server {
    listen 8085;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /bakeryFlow/ {
        try_files $uri $uri/ /bakeryFlow/index.html;
    }
}
