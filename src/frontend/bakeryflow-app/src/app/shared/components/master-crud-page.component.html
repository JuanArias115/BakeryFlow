<section class="master-page">
  <div class="panel panel-form">
    <app-page-header [title]="title" [description]="description"></app-page-header>

    <form [formGroup]="form" class="entity-form" (ngSubmit)="submit()">
      <ng-container *ngFor="let field of fields">
        <mat-form-field appearance="outline" *ngIf="field.type !== 'checkbox'">
          <mat-label>{{ field.label }}</mat-label>

          <input
            *ngIf="field.type === 'text' || field.type === 'email'"
            matInput
            [type]="field.type"
            [formControlName]="field.key"
          />

          <input
            *ngIf="field.type === 'number'"
            matInput
            type="number"
            [formControlName]="field.key"
            [step]="field.step || '0.01'"
          />

          <textarea
            *ngIf="field.type === 'textarea'"
            matInput
            rows="3"
            [formControlName]="field.key"
          ></textarea>

          <mat-select *ngIf="field.type === 'select'" [formControlName]="field.key">
            <mat-option *ngFor="let option of options[field.key] || []" [value]="option.id">
              {{ option.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-checkbox *ngIf="field.type === 'checkbox'" [formControlName]="field.key">
          {{ field.label }}
        </mat-checkbox>
      </ng-container>

      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit">
          {{ editingId ? 'Actualizar' : 'Crear' }}
        </button>
        <button mat-stroked-button type="button" (click)="resetForm()">Limpiar</button>
      </div>
    </form>
  </div>

  <div class="panel panel-table">
    <div class="table-toolbar">
      <mat-form-field appearance="outline">
        <mat-label>Buscar</mat-label>
        <input matInput [value]="search" (keyup)="onSearchChange(($any($event.target)).value)" />
      </mat-form-field>
      <span class="error" *ngIf="error">{{ error }}</span>
    </div>

    <div class="table-wrapper" *ngIf="!loading; else loadingState">
      <table mat-table [dataSource]="items">
        <ng-container *ngFor="let column of columns" [matColumnDef]="column.key">
          <th mat-header-cell *matHeaderCellDef>{{ column.label }}</th>
          <td mat-cell *matCellDef="let item">{{ renderValue(item, column) }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let item" class="actions-cell">
            <button mat-button type="button" (click)="edit(item)">Editar</button>
            <button mat-button type="button" (click)="toggleStatus(item)">
              {{ item['isActive'] ? 'Desactivar' : 'Activar' }}
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>

    <ng-template #loadingState>
      <div class="loading-state">
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
      </div>
    </ng-template>

    <mat-paginator
      [length]="totalCount"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 20, 50]"
      (page)="onPageChange($event)"
    ></mat-paginator>
  </div>
</section>
