<section class="login-page">
  <div class="login-shell">
    <div class="brand-lockup">
      <span class="brand-mark">BF</span>
      <div>
        <p class="eyebrow">BakeryFlow</p>
        <h1>Ingresar</h1>
      </div>
    </div>

    <div class="login-card">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="fill">
          <mat-label>Correo</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="username" />
          <mat-icon matSuffix>mail</mat-icon>
          <mat-error *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
            Ingresa un correo válido.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <mat-icon matSuffix>lock</mat-icon>
          <mat-error *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
            La contraseña es obligatoria.
          </mat-error>
        </mat-form-field>

        <p class="error" *ngIf="error">{{ error }}</p>

        <button mat-flat-button color="primary" type="submit" [disabled]="loading">
          <mat-icon>{{ loading ? 'hourglass_top' : 'login' }}</mat-icon>
          {{ loading ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>
    </div>
  </div>
</section>
