<app-page-header
  title="Compras"
  description="Historial de compras registrado y estado de confirmación."
></app-page-header>

<section class="card">
  <table mat-table [dataSource]="items">
    <ng-container matColumnDef="supplierName">
      <th mat-header-cell *matHeaderCellDef>Proveedor</th>
      <td mat-cell *matCellDef="let item">{{ item.supplierName }}</td>
    </ng-container>
    <ng-container matColumnDef="invoiceNumber">
      <th mat-header-cell *matHeaderCellDef>Factura</th>
      <td mat-cell *matCellDef="let item">{{ item.invoiceNumber || '—' }}</td>
    </ng-container>
    <ng-container matColumnDef="purchaseDate">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let item">{{ item.purchaseDate | date: 'shortDate' }}</td>
    </ng-container>
    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef>Total</th>
      <td mat-cell *matCellDef="let item">{{ currency(item.total) }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let item">{{ item.status }}</td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="['supplierName', 'invoiceNumber', 'purchaseDate', 'total', 'status']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['supplierName', 'invoiceNumber', 'purchaseDate', 'total', 'status']"></tr>
  </table>
</section>
