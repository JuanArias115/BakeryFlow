<app-page-header
  title="Producción"
  description="Consulta las órdenes simples de producción registradas."
></app-page-header>

<section class="card">
  <table mat-table [dataSource]="items">
    <ng-container matColumnDef="productName">
      <th mat-header-cell *matHeaderCellDef>Producto</th>
      <td mat-cell *matCellDef="let item">{{ item.productName }}</td>
    </ng-container>
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let item">{{ item.date | date: 'short' }}</td>
    </ng-container>
    <ng-container matColumnDef="quantityToProduce">
      <th mat-header-cell *matHeaderCellDef>Cantidad objetivo</th>
      <td mat-cell *matCellDef="let item">{{ item.quantityToProduce }}</td>
    </ng-container>
    <ng-container matColumnDef="quantityActual">
      <th mat-header-cell *matHeaderCellDef>Cantidad real</th>
      <td mat-cell *matCellDef="let item">{{ item.quantityActual }}</td>
    </ng-container>
    <ng-container matColumnDef="totalCost">
      <th mat-header-cell *matHeaderCellDef>Costo</th>
      <td mat-cell *matCellDef="let item">{{ item.totalCost | number: '1.2-4' }}</td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="['productName', 'date', 'quantityToProduce', 'quantityActual', 'totalCost']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['productName', 'date', 'quantityToProduce', 'quantityActual', 'totalCost']"></tr>
  </table>
</section>
