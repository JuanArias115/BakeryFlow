<app-page-header
  title="Recetas y costeo"
  description="Consulta la receta base activa por producto y el costo estimado actual."
></app-page-header>

<div class="page-grid">
  <section class="card">
    <h3>Costeo por producto</h3>
    <div class="costing-controls">
      <mat-form-field appearance="outline">
        <mat-label>Producto</mat-label>
        <mat-select [(ngModel)]="selectedProductId">
          <mat-option *ngFor="let product of products" [value]="product.id">{{ product.label }}</mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-flat-button color="primary" type="button" (click)="loadCosting()">Consultar</button>
    </div>

    <div *ngIf="costing" class="costing-grid">
      <app-stat-card label="Precio de venta" [value]="currency(costing.salePrice)"></app-stat-card>
      <app-stat-card label="Costo total receta" [value]="currency(costing.totalRecipeCost)"></app-stat-card>
      <app-stat-card label="Costo por unidad" [value]="currency(costing.unitCost)"></app-stat-card>
      <app-stat-card label="Utilidad estimada" [value]="currency(costing.estimatedGrossProfit)"></app-stat-card>
    </div>
  </section>

  <section class="card">
    <h3>Listado de recetas</h3>
    <table mat-table [dataSource]="recipes">
      <ng-container matColumnDef="productName">
        <th mat-header-cell *matHeaderCellDef>Producto</th>
        <td mat-cell *matCellDef="let item">{{ item.productName }}</td>
      </ng-container>
      <ng-container matColumnDef="yield">
        <th mat-header-cell *matHeaderCellDef>Rendimiento</th>
        <td mat-cell *matCellDef="let item">{{ item.yield }} {{ item.yieldUnit }}</td>
      </ng-container>
      <ng-container matColumnDef="totalRecipeCost">
        <th mat-header-cell *matHeaderCellDef>Costo receta</th>
        <td mat-cell *matCellDef="let item">{{ currency(item.totalRecipeCost) }}</td>
      </ng-container>
      <ng-container matColumnDef="unitCost">
        <th mat-header-cell *matHeaderCellDef>Costo unitario</th>
        <td mat-cell *matCellDef="let item">{{ currency(item.unitCost) }}</td>
      </ng-container>
      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let item">{{ item.isActive ? 'Activa' : 'Inactiva' }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="['productName', 'yield', 'totalRecipeCost', 'unitCost', 'isActive']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['productName', 'yield', 'totalRecipeCost', 'unitCost', 'isActive']"></tr>
    </table>
  </section>
</div>
