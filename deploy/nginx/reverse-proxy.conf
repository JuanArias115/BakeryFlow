upstream bakeryflow_frontend {
    server frontend:8085;
}

upstream bakeryflow_backend {
    server backend:8086;
}

server {
    listen 80;
    server_name deliciasbakery.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name deliciasbakery.shop;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    client_max_body_size 20m;
    server_tokens off;

    location = / {
        return 301 /bakeryFlow/;
    }

    location /bakeryFlow/api/ {
        proxy_pass http://bakeryflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /bakeryFlow/ {
        proxy_pass http://bakeryflow_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
